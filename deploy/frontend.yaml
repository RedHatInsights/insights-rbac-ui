# yaml-language-server: $schema=https://raw.githubusercontent.com/RedHatInsights/frontend-components/refs/heads/master/packages/config-utils/src/feo/spec/frontend-crd.schema.json
---
apiVersion: v1
kind: Template
metadata:
  name: rbac-frontend
objects:
  - apiVersion: cloud.redhat.com/v1alpha1
    kind: Frontend
    metadata:
      name: rbac
    spec:
      envName: ${ENV_NAME}
      title: RBAC
      deploymentRepo: https://github.com/RedHatInsights/insights-rbac-ui
      API:
        versions:
          - v1
        specs:
          - url: https://console.redhat.com/api/rbac/v1/openapi.json
            bundleLabels: ["iam"]
      frontend:
        paths:
          - /apps/rbac
      image: ${IMAGE}:${IMAGE_TAG}
      feoConfigEnabled: true
      # Search entries: IAM/RBAC terms for console search (see frontend-operator search.md + api_reference).
      # V1 entries: single loosePermissions so AND semantics do not hide results.
      # V2 entries: featureFlag + loosePermissions for access-management hrefs.
      # Reusable permission blocks (YAML anchors) for readability.
      searchEntries:
        - id: rbac-org-admin
          title: Org Admins
          href: /iam/user-access/users
          description: Manage your organization's administrator users (Identity & Access Management).
          alt_title: [org administrator, IAM, user access]
          permissions:
            - &featureFlagV1
              method: featureFlag
              args: [platform.rbac.workspaces-organization-management, false]
            - &loosePrincipalRead
              method: loosePermissions
              args: [[rbac:principal:read]]
        - id: rbac-org-admin-v2
          title: Org Admins
          href: /iam/access-management/users-and-user-groups
          description: Manage your organization's administrator users (Identity & Access Management).
          alt_title: [org administrator, IAM, user access]
          permissions:
            - &featureFlagV2
              method: featureFlag
              args: [platform.rbac.workspaces-organization-management, true]
            - *loosePrincipalRead
        - id: rbac-roles
          title: Roles
          href: /iam/user-access/roles
          description: View and manage custom roles for your organization (Identity & Access Management).
          alt_title: [role, roles, RBAC, IAM, user access]
          permissions:
            - *featureFlagV1
            - &looseRoleRead
              method: loosePermissions
              args: [[rbac:role:read]]
        - id: rbac-roles-v2
          title: Roles
          href: /iam/access-management/roles
          description: View and manage custom roles for your organization (Identity & Access Management).
          alt_title: [role, roles, RBAC, IAM, user access]
          permissions:
            - *featureFlagV2
            - *looseRoleRead
        - id: rbac-workspaces
          title: Workspaces
          href: /iam/user-access/workspaces
          description: Organize systems with workspaces for granular user access (Identity & Access Management).
          alt_title: [workspace, workspaces, IAM, user access, RBAC]
          permissions:
            - *featureFlagV1
            - &featureFlagWorkspacesList
              method: featureFlag
              args: [platform.rbac.workspaces-list, true]
            - &looseInventoryGroupsRead
              method: loosePermissions
              args: [[inventory:groups:read]]
        - id: rbac-workspaces-v2
          title: Workspaces
          href: /iam/access-management/workspaces
          description: Organize systems with workspaces for granular user access (Identity & Access Management).
          alt_title: [workspace, workspaces, IAM, user access, RBAC]
          permissions:
            - *featureFlagV2
            - *featureFlagWorkspacesList
            - *looseInventoryGroupsRead
        - id: rbac-users
          title: Users
          href: /iam/user-access/users
          description: Manage users and their role-based access (Identity & Access Management).
          alt_title: [user, users, IAM, user access, RBAC]
          permissions:
            - *featureFlagV1
            - *loosePrincipalRead
        - id: rbac-users-v2
          title: Users
          href: /iam/access-management/users-and-user-groups
          description: Manage users and their role-based access (Identity & Access Management).
          alt_title: [user, users, IAM, user access, RBAC]
          permissions:
            - *featureFlagV2
            - *loosePrincipalRead
        - id: rbac-groups
          title: Groups
          href: /iam/user-access/groups
          description: Manage groups and their role assignments (Identity & Access Management).
          alt_title: [group, groups, IAM, user access, RBAC]
          permissions:
            - *featureFlagV1
            - &looseGroupRead
              method: loosePermissions
              args: [[rbac:group:read]]
        - id: rbac-groups-v2
          title: Groups
          href: /iam/access-management/users-and-user-groups
          description: Manage groups and their role assignments (Identity & Access Management).
          alt_title: [group, groups, IAM, user access, RBAC]
          permissions:
            - *featureFlagV2
            - *looseGroupRead
        - id: rbac-my-access
          title: My Access
          href: /iam/my-user-access
          description: View your current permissions and access (Identity & Access Management).
          alt_title:
            - my access
            - my permissions
            - IAM
            - RBAC
            - user access
        - id: rbac-access-management
          title: Access Management
          href: /iam/access-management/users-and-user-groups
          description: Manage users, groups, roles, and workspaces (Identity & Access Management).
          alt_title: [access management, IAM, user access, RBAC, roles, workspaces]
          permissions:
            - *featureFlagV2
            - method: loosePermissions
              args:
                - - rbac:principal:read
                - - rbac:group:read
      # Service tiles: user-access (V1) tiles have no featureFlag so User Access always loads.
      # V2 tiles add access-management links when platform.rbac.workspaces-organization-management is true.
      serviceTiles:
        - section: iam
          group: iam
          id: users
          href: /iam/user-access/users
          title: Users
          description: Manage your organization's role-based access control (RBAC) to services.
          icon: PlaceholderIcon
          permissions:
            - &featureFlagV1
              method: featureFlag
              args: [platform.rbac.workspaces-organization-management, false]
            - *loosePrincipalRead
        - section: iam
          group: iam
          id: users-v2
          href: /iam/access-management/users-and-user-groups
          title: Users
          description: Manage your organization's role-based access control (RBAC) to services.
          icon: PlaceholderIcon
          permissions:
            - *featureFlagV2
            - *loosePrincipalRead
        - section: iam
          group: iam
          id: groups
          href: /iam/user-access/groups
          title: Groups
          description: ""
          icon: PlaceholderIcon
          permissions:
            - *featureFlagV1
            - *looseGroupRead
        - section: iam
          group: iam
          id: groups-v2
          href: /iam/access-management/users-and-user-groups
          title: Groups
          description: ""
          icon: PlaceholderIcon
          permissions:
            - *featureFlagV2
            - *looseGroupRead
        - section: iam
          group: iam
          id: workspaces
          href: /iam/user-access/workspaces
          title: Workspaces
          description: ""
          icon: PlaceholderIcon
          permissions:
            - *featureFlagV1
            - *featureFlagWorkspacesList
            - *looseInventoryGroupsRead
        - section: iam
          group: iam
          id: workspaces-v2
          href: /iam/access-management/workspaces
          title: Workspaces
          description: ""
          icon: PlaceholderIcon
          permissions:
            - *featureFlagV2
            - *featureFlagWorkspacesList
            - *looseInventoryGroupsRead
      bundleSegments:
        # IAM bundle nav: V1 vs V2 controlled by platform.rbac.workspaces-organization-management.
        # V1 (flag false): My User Access, User Access (Overview, Users, Roles, Groups, Workspaces, Audit Log, Red Hat Access Requests).
        # V2 (flag true):  Overview, My Access, Access Management (Users and Groups, Roles, Workspaces, Audit Log), Organization Management (org-wide, trusted orgs, auth factors, IdP). Learning Resources / Request Access / Service Accounts nav come from Chrome or other frontends.
        - segmentId: module-rbac-ui
          bundleId: iam
          navItems:
            # V2 navigation (platform.rbac.workspaces-organization-management = true)
            - id: overview
              title: Overview
              href: /iam/overview
              permissions:
                - method: featureFlag
                  args:
                    - platform.rbac.workspaces-organization-management
                    - true
                - method: featureFlag
                  args:
                    - platform.rbac.overview
                    - true
                - method: loosePermissions
                  args:
                    - - rbac:*:read
              product: Identity & Access Management
            - id: my-access
              title: My Access
              href: /iam/my-user-access
              permissions:
                - method: featureFlag
                  args:
                    - platform.rbac.workspaces-organization-management
                    - true
            - id: access-management
              title: Access Management
              expandable: true
              permissions:
                - method: featureFlag
                  args:
                    - platform.rbac.workspaces-organization-management
                    - true
                - method: loosePermissions
                  args:
                    - - rbac:principal:read
                    - - rbac:group:read
                    - - rbac:role:read
                    - - inventory:groups:read
              routes:
                - id: users-and-groups
                  title: Users and Groups
                  href: /iam/access-management/users-and-user-groups
                  permissions:
                    - method: loosePermissions
                      args:
                        - - rbac:principal:read
                        - - rbac:group:read
                  product: Identity & Access Management
                - id: roles
                  title: Roles
                  href: /iam/access-management/roles
                  permissions:
                    - method: loosePermissions
                      args:
                        - - rbac:role:read
                  product: Identity & Access Management
                - id: workspaces
                  title: Workspaces
                  href: /iam/access-management/workspaces
                  icon: PlaceholderIcon
                  permissions:
                    - method: featureFlag
                      args:
                        - platform.rbac.workspaces-list
                        - true
                    - method: loosePermissions
                      args:
                        - - 'inventory:groups:read'
                  product: Identity & Access Management
                - id: audit-log
                  title: Audit Log
                  href: /iam/access-management/audit-log
                  permissions:
                    - method: isOrgAdmin
                  product: Identity & Access Management
                - segmentRef:
                    frontendName: service-accounts
                    segmentId: iam-access-management-service-accounts
            - id: organization-management
              title: Organization Management
              expandable: true
              permissions:
                - method: featureFlag
                  args:
                    - platform.rbac.workspaces-organization-management
                    - true
                - method: isOrgAdmin
              routes:
                - id: organization-wide-access
                  title: Organization-Wide Access
                  href: /iam/organization-management/organization-wide-access
                  permissions:
                    - method: isOrgAdmin
                  product: Identity & Access Management
                - id: trusted-organizations
                  title: Trusted Organizations
                  href: /iam/organization-management/trusted-organizations
                  permissions:
                    - method: isOrgAdmin
                  product: Identity & Access Management
                - id: authentication-factors
                  title: Authentication Factors
                  href: /iam/organization-management/authentication-factors
                  permissions:
                    - method: isOrgAdmin
                  product: Identity & Access Management
                - id: identity-provider-integration
                  title: Identity Provider Integration
                  href: /iam/organization-management/identity-provider-integration
                  permissions:
                    - method: isOrgAdmin
                  product: Identity & Access Management
            # V1 navigation (platform.rbac.workspaces-organization-management = false)
            - id: my-user-access
              title: My User Access
              href: /iam/my-user-access
              permissions:
                - method: featureFlag
                  args:
                    - platform.rbac.workspaces-organization-management
                    - false
            - id: user-access
              title: User Access
              expandable: true
              permissions:
                - method: loosePermissions
                  args:
                    - - rbac:principal:read
                    - - rbac:group:read
                    - - rbac:role:read
                    - - inventory:groups:read
                - method: featureFlag
                  args:
                    - platform.rbac.workspaces-organization-management
                    - false
              routes:
                - id: user-access-overview
                  title: Overview
                  href: /iam/user-access/overview
                  permissions:
                    - method: featureFlag
                      args:
                        - platform.rbac.overview
                        - true
                    - method: loosePermissions
                      args:
                        - - rbac:*:read
                  product: Identity & Access Management
                - id: users
                  title: Users
                  href: /iam/user-access/users
                  permissions:
                    - method: loosePermissions
                      args:
                        - - rbac:principal:read
                  icon: PlaceholderIcon
                  product: Identity & Access Management
                - id: roles
                  title: Roles
                  href: /iam/user-access/roles
                  permissions:
                    - method: loosePermissions
                      args:
                        - - rbac:role:read
                  product: Identity & Access Management
                - id: groups
                  title: Groups
                  href: /iam/user-access/groups
                  permissions:
                    - method: loosePermissions
                      args:
                        - - rbac:group:read
                  icon: PlaceholderIcon
                  product: Identity & Access Management
                - id: workspaces
                  title: Workspaces
                  href: /iam/user-access/workspaces
                  icon: PlaceholderIcon
                  permissions:
                    - method: featureFlag
                      args:
                        - platform.rbac.workspaces-list
                        - true
                    - method: loosePermissions
                      args:
                        - - 'inventory:groups:read'
                  product: Identity & Access Management
                - id: audit-log
                  title: Audit Log
                  href: /iam/user-access/audit-log
                  permissions:
                    - method: isOrgAdmin
                  product: Identity & Access Management
                - segmentRef:
                    frontendName: access-requests
                    segmentId: iam-access-requests
          position: 100
      module:
        manifestLocation: /apps/rbac/fed-mods.json
        defaultDocumentTitle: User Access | Identity & Access Management
        config:
          ssoScopes:
            - api.console
            - api.iam.service_accounts
        modules:
          - id: settings-user-access
            module: ./SettingsUserAccess
            routes:
              - pathname: /settings/rbac
          - id: iam-user-access
            module: ./Iam
            routes:
              - pathname: /iam

parameters:
  - name: ENV_NAME
    required: true
  - name: IMAGE_TAG
    required: true
  - name: IMAGE
    value: quay.io/redhat-services-prod/rh-platform-experien-tenant/insights-rbac-ui
